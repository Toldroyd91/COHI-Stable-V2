<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Sniper v2</title>
    <style>
        :root { --accent: #0dcaf0; --bg: #121212; --panel: rgba(20, 20, 20, 0.85); }
        
        /* Uses dvh to prevent mobile browser bars from hiding the bottom UI */
        body { margin: 0; height: 100dvh; overflow: hidden; background: var(--bg); color: white; font-family: system-ui, sans-serif; touch-action: none; overscroll-behavior: none; }
        
        #viewport { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }
        #canvas-container { transform-origin: 0 0; position: absolute; }
        
        /* Fixed Crosshair */
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 50; display: flex; align-items: center; justify-content: center; }
        .crosshair::before { content: ''; position: absolute; width: 44px; height: 2px; background: var(--accent); box-shadow: 0 0 6px #000; }
        .crosshair::after { content: ''; position: absolute; height: 44px; width: 2px; background: var(--accent); box-shadow: 0 0 6px #000; }
        .dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; z-index: 51; box-shadow: 0 0 4px #000; }

        /* UI Layer */
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; padding-bottom: env(safe-area-inset-bottom, 15px); }
        
        /* Top Toolbar */
        .toolbar { pointer-events: auto; display: flex; justify-content: center; gap: 8px; background: var(--panel); padding: 8px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tool-btn { background: transparent; color: #aaa; border: none; padding: 10px 15px; font-weight: bold; border-radius: 8px; font-size: 14px; transition: 0.2s; }
        .tool-btn.active { background: var(--accent); color: #000; }

        /* Bottom Controls */
        .bottom-controls { pointer-events: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Nudge D-Pad */
        .d-pad-container { display: flex; justify-content: flex-end; width: 100%; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; gap: 6px; }
        .nudge-btn { background: var(--panel); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .nudge-btn:active { background: var(--accent); color: black; }
        
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* Action Button */
        #btn-action { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 900; font-size: 16px; background: var(--accent); color: #000; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(13,202,240,0.3); transition: 0.2s; }
        #btn-action.confirm-mode { background: #10b981; box-shadow: 0 4px 15px rgba(16,185,129,0.3); color: white; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas-container">
        <img id="survey-img" src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="display: block;">
        <canvas id="drawing-layer" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
        <canvas id="ghost-layer" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
    </div>

    <div class="crosshair"><div class="dot"></div></div>

    <div class="ui-layer">
        <div class="toolbar">
            <button class="tool-btn active" data-tool="line">📐 Line</button>
            <button class="tool-btn" data-tool="highlight">🖍️ Highlight</button>
            <button class="tool-btn" data-tool="text">📝 Text</button>
        </div>

        <div class="bottom-controls">
            <div class="d-pad-container">
                <div class="d-pad">
                    <div class="nudge-btn" id="btn-up">↑</div>
                    <div class="nudge-btn" id="btn-left">←</div>
                    <div class="nudge-btn" id="btn-right">→</div>
                    <div class="nudge-btn" id="btn-down">↓</div>
                </div>
            </div>
            <button id="btn-action">🎯 Place Anchor Start</button>
        </div>
    </div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('canvas-container');
    const img = document.getElementById('survey-img');
    const drawingCanvas = document.getElementById('drawing-layer');
    const drawCtx = drawingCanvas.getContext('2d');
    const ghostCanvas = document.getElementById('ghost-layer');
    const ghostCtx = ghostCanvas.getContext('2d');
    const actionBtn = document.getElementById('btn-action');

    let state = {
        scale: 1, offsetX: 0, offsetY: 0,
        isDragging: false, startX: 0, startY: 0
    };

    let activeTool = 'line';
    let anchorPoint = null; 

    // Initialize Canvases
    img.onload = () => {
        drawingCanvas.width = img.width; drawingCanvas.height = img.height;
        ghostCanvas.width = img.width; ghostCanvas.height = img.height;
        state.offsetX = (window.innerWidth - img.width) / 2;
        state.offsetY = (window.innerHeight - img.height) / 2;
        updateTransform();
    };
    if(img.complete) img.onload();

    // --- TOOL SELECTION ---
    document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeTool = e.target.dataset.tool;
            cancelDrafting(); // Reset if changing tools mid-draw
        });
    });

    // --- MATH: Get precise image coordinate under the crosshair ---
    function getCrosshairImgPos() {
        return {
            x: (window.innerWidth / 2 - state.offsetX) / state.scale,
            y: (window.innerHeight / 2 - state.offsetY) / state.scale
        };
    }

    // --- PAN ENGINE (1 Finger) ---
    viewport.addEventListener('pointerdown', (e) => {
        if(e.target.closest('.ui-layer')) return;
        state.isDragging = true;
        state.startX = e.clientX - state.offsetX;
        state.startY = e.clientY - state.offsetY;
    });

    viewport.addEventListener('pointermove', (e) => {
        if (!state.isDragging) return;
        state.offsetX = e.clientX - state.startX;
        state.offsetY = e.clientY - state.startY;
        updateTransform();
    });

    viewport.addEventListener('pointerup', () => state.isDragging = false);

    // --- PINCH-TO-ZOOM ENGINE (2 Fingers) ---
    let initialPinchDist = null;
    viewport.addEventListener('touchmove', (e) => {
        if(e.touches.length === 2) {
            e.preventDefault(); // Prevent native zoom
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if(initialPinchDist) {
                const delta = dist / initialPinchDist;
                changeZoomBy(delta);
            }
            initialPinchDist = dist;
        }
    }, {passive: false});
    
    viewport.addEventListener('touchend', (e) => {
        if(e.touches.length < 2) initialPinchDist = null;
    });

    function changeZoomBy(factor) {
        const oldScale = state.scale;
        state.scale *= factor;
        if(state.scale < 0.2) state.scale = 0.2;
        if(state.scale > 8) state.scale = 8;

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const imgX = (centerX - state.offsetX) / oldScale;
        const imgY = (centerY - state.offsetY) / oldScale;

        state.offsetX = centerX - (imgX * state.scale);
        state.offsetY = centerY - (imgY * state.scale);
        updateTransform();
    }

    // --- NUDGE ENGINE ---
    function nudge(dx, dy) {
        state.offsetX -= dx * state.scale;
        state.offsetY -= dy * state.scale;
        updateTransform();
    }
    document.getElementById('btn-up').onclick = () => nudge(0, -1);
    document.getElementById('btn-down').onclick = () => nudge(0, 1);
    document.getElementById('btn-left').onclick = () => nudge(-1, 0);
    document.getElementById('btn-right').onclick = () => nudge(1, 0);

    // --- THE GHOST RENDERER ---
    function updateTransform() {
        container.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale})`;
        
        // Draw the live line if we are anchored
        ghostCtx.clearRect(0, 0, ghostCanvas.width, ghostCanvas.height);
        if (anchorPoint && (activeTool === 'line' || activeTool === 'highlight')) {
            const currentPos = getCrosshairImgPos();
            ghostCtx.beginPath();
            ghostCtx.moveTo(anchorPoint.x, anchorPoint.y);
            ghostCtx.lineTo(currentPos.x, currentPos.y);
            
            // Dynamic Thickness: Scales down as you zoom in so lines stay thin!
            ghostCtx.lineWidth = activeTool === 'highlight' ? (24 / state.scale) : (4 / state.scale);
            ghostCtx.strokeStyle = activeTool === 'highlight' ? 'rgba(255, 255, 0, 0.6)' : '#0dcaf0';
            
            if(activeTool === 'line') {
                ghostCtx.setLineDash([10 / state.scale, 10 / state.scale]); // Dashed while ghosting
            } else {
                ghostCtx.setLineDash([]);
            }
            ghostCtx.stroke();
            ghostCtx.setLineDash([]);
        }
    }

    // --- ACTION BUTTON LOGIC (Anchor / Draw / Text) ---
    function cancelDrafting() {
        anchorPoint = null;
        ghostCtx.clearRect(0, 0, ghostCanvas.width, ghostCanvas.height);
        actionBtn.innerText = "🎯 Place Anchor Start";
        actionBtn.classList.remove('confirm-mode');
    }

    actionBtn.addEventListener('click', () => {
        const currentPos = getCrosshairImgPos();

        if (activeTool === 'text') {
            const label = prompt("Enter Annotation Text:");
            if (label) {
                const fontSize = 24 / state.scale; // Dynamic text size
                drawCtx.fillStyle = '#fff';
                drawCtx.font = `bold ${fontSize}px sans-serif`;
                drawCtx.shadowColor = 'black';
                drawCtx.shadowBlur = 4 / state.scale;
                drawCtx.fillText(label, currentPos.x, currentPos.y);
            }
            return;
        }

        if (!anchorPoint) {
            // STEP 1: Drop the first point
            anchorPoint = currentPos;
            actionBtn.innerText = "✅ Confirm Endpoint";
            actionBtn.classList.add('confirm-mode');
        } else {
            // STEP 2: Commit the line
            drawCtx.beginPath();
            drawCtx.moveTo(anchorPoint.x, anchorPoint.y);
            drawCtx.lineTo(currentPos.x, currentPos.y);
            drawCtx.lineWidth = activeTool === 'highlight' ? (24 / state.scale) : (4 / state.scale);
            drawCtx.strokeStyle = activeTool === 'highlight' ? 'rgba(255, 255, 0, 0.6)' : '#0dcaf0';
            drawCtx.stroke();
