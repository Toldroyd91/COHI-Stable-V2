<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Sniper v3 (Pure Touch)</title>
    <style>
        :root { --accent: #0dcaf0; --bg: #121212; --panel: rgba(20, 20, 20, 0.85); }
        
        body { margin: 0; height: 100dvh; width: 100vw; overflow: hidden; background: var(--bg); color: white; font-family: system-ui, sans-serif; touch-action: none; overscroll-behavior: none; -webkit-user-select: none; user-select: none; }
        
        #viewport { position: absolute; inset: 0; overflow: hidden; touch-action: none; }
        #canvas-container { transform-origin: 0 0; position: absolute; will-change: transform; }
        
        /* Fixed Crosshair */
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 50; display: flex; align-items: center; justify-content: center; }
        .crosshair::before { content: ''; position: absolute; width: 44px; height: 2px; background: var(--accent); box-shadow: 0 0 6px #000; }
        .crosshair::after { content: ''; position: absolute; height: 44px; width: 2px; background: var(--accent); box-shadow: 0 0 6px #000; }
        .dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; z-index: 51; box-shadow: 0 0 4px #000; }

        /* UI Layer */
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; padding-bottom: env(safe-area-inset-bottom, 25px); }
        
        /* Top Toolbar */
        .toolbar { pointer-events: auto; display: flex; justify-content: center; gap: 8px; background: var(--panel); padding: 8px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); margin-top: env(safe-area-inset-top, 10px); }
        .tool-btn { background: transparent; color: #aaa; border: none; padding: 10px 15px; font-weight: bold; border-radius: 8px; font-size: 14px; transition: 0.2s; touch-action: manipulation; }
        .tool-btn.active { background: var(--accent); color: #000; }

        /* Bottom Controls */
        .bottom-controls { pointer-events: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Nudge D-Pad */
        .d-pad-container { display: flex; justify-content: flex-end; width: 100%; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; gap: 6px; }
        .nudge-btn { background: var(--panel); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); touch-action: manipulation; }
        .nudge-btn:active { background: var(--accent); color: black; }
        
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* Action Button */
        #btn-action { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 900; font-size: 16px; background: var(--accent); color: #000; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(13,202,240,0.3); transition: 0.2s; touch-action: manipulation; }
        #btn-action.confirm-mode { background: #10b981; box-shadow: 0 4px 15px rgba(16,185,129,0.3); color: white; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas-container">
        <img id="survey-img" src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="display: block; min-width: 800px; min-height: 600px;">
        <canvas id="drawing-layer" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
        <canvas id="ghost-layer" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
    </div>

    <div class="crosshair"><div class="dot"></div></div>

    <div class="ui-layer">
        <div class="toolbar">
            <button class="tool-btn active" data-tool="line">📐 Line</button>
            <button class="tool-btn" data-tool="highlight">🖍️ Highlight</button>
            <button class="tool-btn" data-tool="text">📝 Text</button>
        </div>

        <div class="bottom-controls">
            <div class="d-pad-container">
                <div class="d-pad">
                    <div class="nudge-btn" id="btn-up">↑</div>
                    <div class="nudge-btn" id="btn-left">←</div>
                    <div class="nudge-btn" id="btn-right">→</div>
                    <div class="nudge-btn" id="btn-down">↓</div>
                </div>
            </div>
            <button id="btn-action">🎯 Place Anchor Start</button>
        </div>
    </div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('canvas-container');
    const img = document.getElementById('survey-img');
    const drawingCanvas = document.getElementById('drawing-layer');
    const drawCtx = drawingCanvas.getContext('2d');
    const ghostCanvas = document.getElementById('ghost-layer');
    const ghostCtx = ghostCanvas.getContext('2d');
    const actionBtn = document.getElementById('btn-action');

    let state = {
        scale: 1, offsetX: 0, offsetY: 0,
        isDragging: false
    };

    let activeTool = 'line';
    let anchorPoint = null; 
    let lastTouch = { x: 0, y: 0 };
    let initialPinchDist = null;

    // --- INITIALIZATION ---
    function initCanvas() {
        // Fallback dimensions if image fails to load properly
        const w = img.naturalWidth || 1200;
        const h = img.naturalHeight || 800;
        drawingCanvas.width = w; drawingCanvas.height = h;
        ghostCanvas.width = w; ghostCanvas.height = h;
        
        state.offsetX = (window.innerWidth - w) / 2;
        state.offsetY = (window.innerHeight - h) / 2;
        updateTransform();
    }
    
    if(img.complete) { initCanvas(); } else { img.onload = initCanvas; }

    // --- TOOL SELECTION ---
    // Using touchstart for zero delay
    document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Stop click emulation
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeTool = e.target.dataset.tool;
            cancelDrafting(); 
        });
    });

    function getCrosshairImgPos() {
        return {
            x: (window.innerWidth / 2 - state.offsetX) / state.scale,
            y: (window.innerHeight / 2 - state.offsetY) / state.scale
        };
    }

    // --- THE PURE TOUCH ENGINE (Pan & Pinch) ---
    viewport.addEventListener('touchstart', (e) => {
        // Ignore if touching UI buttons
        if(e.target.closest('.ui-layer')) return; 
        e.preventDefault(); 

        if (e.touches.length === 1) {
            state.isDragging = true;
            lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            state.isDragging = false;
            initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }, {passive: false});

    viewport.addEventListener('touchmove', (e) => {
        if(e.target.closest('.ui-layer')) return;
        e.preventDefault();

        if (e.touches.length === 1 && state.isDragging) {
            // Panning
            const dx = e.touches[0].clientX - lastTouch.x;
            const dy = e.touches[0].clientY - lastTouch.y;
            state.offsetX += dx;
            state.offsetY += dy;
            lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            updateTransform();
        } else if (e.touches.length === 2 && initialPinchDist) {
            // Pinching
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const factor = dist / initialPinchDist;
            changeZoomBy(factor);
            initialPinchDist = dist; // continuous zoom
        }
    }, {passive: false});

    viewport.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) initialPinchDist = null;
        if (e.touches.length === 0) state.isDragging = false;
    });

    function changeZoomBy(factor) {
        const oldScale = state.scale;
        state.scale *= factor;
        if(state.scale < 0.2) state.scale = 0.2;
        if(state.scale > 8) state.scale = 8;

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const imgX = (centerX - state.offsetX) / oldScale;
        const imgY = (centerY - state.offsetY) / oldScale;

        state.offsetX = centerX - (imgX * state.scale);
        state.offsetY = centerY - (imgY * state.scale);
        updateTransform();
    }

    // --- INSTANT NUDGE ENGINE ---
    function nudge(dx, dy) {
        state.offsetX -= dx * state.scale;
        state.offsetY -= dy * state.scale;
        updateTransform();
    }
    
    // Bind Nudge buttons to touchstart for instant firing
    const bindNudge = (id, dx, dy) => {
        document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); nudge(dx, dy); });
    };
    bindNudge('btn-up', 0, -2);
    bindNudge('btn-down', 0, 2);
    bindNudge('btn-left', -2, 0);
    bindNudge('btn-right', 2, 0);

    // --- GHOST RENDERER ---
    function updateTransform() {
        container.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale})`;
        
        ghostCtx.clearRect(0, 0, ghostCanvas.width, ghostCanvas.height);
        if (anchorPoint && (activeTool === 'line' || activeTool === 'highlight')) {
            const currentPos = getCrosshairImgPos();
            ghostCtx.beginPath();
            ghostCtx.moveTo(anchorPoint.x, anchorPoint.y);
            ghostCtx.lineTo(currentPos.x, currentPos.y);
            
            ghostCtx.lineWidth = activeTool === 'highlight' ? (24 / state.scale) : (4 / state.scale);
            ghostCtx.strokeStyle = activeTool === 'highlight' ? 'rgba(255, 255, 0, 0.6)' : '#0dcaf0';
            
            if(activeTool === 'line') ghostCtx.setLineDash([10 / state.scale, 10 / state.scale]);
            ghostCtx.stroke();
            ghostCtx.setLineDash([]);
        }
    }

    // --- ACTION BUTTON ---
    function cancelDrafting() {
        anchorPoint = null;
        ghostCtx.clearRect(0, 0, ghostCanvas.width, ghostCanvas.height);
        actionBtn.innerText = "🎯 Place Anchor Start";
        actionBtn.classList.remove('confirm-mode');
    }

    actionBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const currentPos = getCrosshairImgPos();

        if (activeTool === 'text') {
            const label = prompt("Enter Annotation Text:");
            if (label) {
                const fontSize = 24 / state.scale;
                drawCtx.fillStyle = '#fff';
                drawCtx.font = `bold ${fontSize}px sans-serif`;
                drawCtx.shadowColor = 'black';
                drawCtx.shadowBlur = 4 / state.scale;
                drawCtx.fillText(label, currentPos.x, currentPos.y);
            }
            return;
        }

        if (!anchorPoint) {
            anchorPoint = currentPos;
            actionBtn.innerText = "✅ Confirm Endpoint";
            actionBtn.classList.add('confirm-mode');
            // Force an initial ghost draw just in case
            updateTransform(); 
        } else {
            drawCtx.beginPath();
            drawCtx.moveTo(anchorPoint.x, anchorPoint.y);
            drawCtx.lineTo(currentPos.x, currentPos.y);
            drawCtx.lineWidth = activeTool === 'highlight' ? (24 / state.scale) : (4 / state.scale);
            drawCtx.strokeStyle = activeTool === 'highlight' ? 'rgba(255, 255, 0, 0.6)' : '#0dcaf0';
            drawCtx.stroke();

            if(activeTool === 'line') {
                const measurement = prompt("Measurement/Label (leave blank for none):");
                if(measurement) {
                    const midX = (anchorPoint.x + currentPos.x) / 2;
                    const midY = (anchorPoint.y + currentPos.y) / 2;
                    const fontSize = 18 / state.scale;
                    drawCtx.fillStyle = '#1A1A1A';
                    const padding = 6 / state.scale;
                    const textWidth = drawCtx.measureText(measurement).width;
                    drawCtx.fillRect(midX - textWidth/2 - padding, midY - fontSize, textWidth + padding*2, fontSize + padding*2);
                    drawCtx.fillStyle = '#0dcaf0';
                    drawCtx.font = `bold ${fontSize}px sans-serif`;
                    drawCtx.textAlign = 'center';
                    drawCtx.textBaseline = 'middle';
                    drawCtx.fillText(measurement, midX, midY);
                }
            }
            cancelDrafting();
        }
    });
</script>
</body>
</html>
