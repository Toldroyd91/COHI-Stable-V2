<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b1118">
    <title>Powerhouse CRM | V3 Pro</title>
    
    <style>
        :root {
            --bg-dark: #070b10;
            --card-bg: rgba(21, 32, 43, 0.6);
            --accent-cyan: #0dcaf0;
            --accent-gold: #d4af37;
            --text-main: #f8f9fa;
            --text-muted: #8b9eb0;
            --border-subtle: rgba(255,255,255,0.08);
            --rag-green: #28a745;
            --rag-amber: #ffc107;
            --rag-red: #dc3545;
        }

        body { background: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--bg-dark); } ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        
        .hidden-view { display: none !important; }
        .dashboard-container { padding: 30px 20px; max-width: 1300px; margin: 0 auto; width: 100%; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        button { font-family: inherit; transition: all 0.2s; cursor: pointer; }
        button:hover:not(:disabled) { transform: translateY(-2px); }

        /* Premium Glass Cards */
        .glass-card { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 25px; position: relative; overflow: hidden; }
        .glass-input { background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle); color: var(--text-main); padding: 12px 15px; border-radius: 8px; width: 100%; outline: none; transition: border 0.3s; }
        .glass-input:focus { border-color: var(--accent-cyan); }
        
        /* Designer Pipeline & RAG System */
        .rag-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; margin-top: 20px; }
        .rag-indicator { position: absolute; top: 0; left: 0; width: 6px; height: 100%; border-radius: 16px 0 0 16px; }
        .heat-badge { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; border: 1px solid transparent; }
        
        .btn-quick { flex: 1; padding: 8px 4px; font-size: 0.75rem; font-weight: bold; border-radius: 6px; border: 1px solid var(--border-subtle); background: rgba(0,0,0,0.4); color: var(--text-muted); text-align: center; }
        .btn-quick:hover { background: rgba(13,202,240,0.1); color: var(--accent-cyan); border-color: var(--accent-cyan); }
        .btn-quick-primary { background: rgba(13,202,240,0.1); color: var(--accent-cyan); border-color: rgba(13,202,240,0.3); }

        /* Typography & Layout */
        .section-header { border-bottom: 1px solid var(--border-subtle); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); color: var(--text-muted); padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; transition: all 0.3s; }
        .filter-btn.active { background: rgba(13, 202, 240, 0.15); color: var(--accent-cyan); border-color: var(--accent-cyan); }
        
        .spec-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; }
        .spec-label { color: var(--text-muted); } .spec-value { font-weight: 600; text-align: right; max-width: 60%; word-wrap: break-word; }

        /* Collapsible Sections */
        .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--border-subtle); margin-bottom: 10px; transition: background 0.2s; }
        .collapsible-content { display: none; padding: 15px; animation: fadeIn 0.3s ease-out; }
        .collapsible-content.expanded { display: block; }
        .expanded .toggle-icon { transform: rotate(180deg); }

        /* Galleries */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .gallery-img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border-subtle); cursor: pointer; transition: transform 0.2s; }
        .gallery-img:hover { transform: scale(1.05); border-color: var(--accent-cyan); z-index: 2; position: relative; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .vault-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; }
        @media (max-width: 900px) { .vault-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header id="global-nav" class="hidden-view" style="background: rgba(7, 11, 16, 0.8); backdrop-filter: blur(20px); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img id="header-brand-logo" src="" style="height: 35px; object-fit: contain;" class="hidden-view">
            <h1 id="header-default-title" style="margin: 0; font-size: 1.3rem; font-weight: 800;">Powerhouse <span style="color: var(--accent-cyan);">CRM</span></h1>
            <span id="nav-role-badge" style="background: rgba(13, 202, 240, 0.1); color: var(--accent-cyan); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; border: 1px solid rgba(13, 202, 240, 0.2);"></span>
        </div>
        <button id="btn-logout" style="background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 6px 16px; border-radius: 6px; font-weight: bold;">Sign Out</button>
    </header>

    <main id="view-login" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="glass-card" style="width: 100%; max-width: 400px; text-align: center; padding: 40px;">
            <h2 style="margin: 0 0 10px 0; font-size: 2rem;">Client <span style="color: var(--accent-cyan);">Vault.</span></h2>
            <input type="text" id="loginId" class="glass-input" placeholder="User ID / Postcode" style="margin-bottom: 15px; text-align: center;">
            <input type="password" id="loginPin" class="glass-input" placeholder="Secure PIN" style="margin-bottom: 25px; text-align: center;">
            <button id="btn-login" style="width: 100%; padding: 15px; background: var(--accent-cyan); color: #000; border: none; border-radius: 10px; font-weight: bold;">Authenticate</button>
            <p id="login-error" class="hidden-view" style="color: #ff4444; margin-top: 20px; font-size: 0.9rem;"></p>
        </div>
    </main>

    <main id="view-designer" class="hidden-view dashboard-container">
        <h2 style="margin: 0 0 20px 0; font-size: 1.8rem;">Command <span style="color: var(--accent-cyan);">Center</span></h2>
        
        <div id="designer-filters" style="display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid var(--border-subtle);">
            <button onclick="window.setDesignerFilter('ALL', this)" class="filter-btn active">All Active</button>
            <button onclick="window.setDesignerFilter('Sales & Planning', this)" class="filter-btn">Sales & Planning</button>
            <button onclick="window.setDesignerFilter('Pre-Commencement', this)" class="filter-btn">Pre-Commencement</button>
            <button onclick="window.setDesignerFilter('Build & Finish', this)" class="filter-btn">Build & Finish</button>
            <button onclick="window.setDesignerFilter('Action Required', this)" class="filter-btn" style="border-color: var(--rag-red); color: var(--rag-red);">Critical Action</button>
        </div>

        <div id="designer-pipeline-container" class="rag-grid"></div>
    </main>

    <div id="modal-notes" class="modal-overlay hidden-view">
        <div class="glass-card" style="width: 100%; max-width: 500px;">
            <h3 style="margin-top:0;">Add Internal Note</h3>
            <textarea id="input-note-text" class="glass-input" rows="4" placeholder="Enter secure internal note..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="document.getElementById('modal-notes').classList.add('hidden-view')" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:6px;">Cancel</button>
                <button id="btn-save-note" style="flex:1; padding:10px; background:var(--accent-cyan); color:#000; border:none; border-radius:6px; font-weight:bold;">Save Note</button>
            </div>
        </div>
    </div>
    
    <div id="modal-contact" class="modal-overlay hidden-view">
        <div class="glass-card" style="width: 100%; max-width: 500px;">
            <h3 style="margin-top:0;">Log Contact</h3>
            <select id="input-contact-type" class="glass-input" style="margin-bottom:15px;"><option value="Phone (Answered)">Phone - Answered</option><option value="Phone (No Answer)">Phone - No Answer</option><option value="Phone (VM Left)">Phone - Left Voicemail</option><option value="WhatsApp">WhatsApp Message</option><option value="Email">Email Sent</option></select>
            <textarea id="input-contact-note" class="glass-input" rows="3" placeholder="Brief details..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="document.getElementById('modal-contact').classList.add('hidden-view')" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:6px;">Cancel</button>
                <button id="btn-save-contact" style="flex:1; padding:10px; background:var(--rag-green); color:#fff; border:none; border-radius:6px; font-weight:bold;">Log Action</button>
            </div>
        </div>
    </div>

    <div id="modal-status" class="modal-overlay hidden-view">
        <div class="glass-card" style="width: 100%; max-width: 500px;">
            <h3 style="margin-top:0;">Update Pipeline Status</h3>
            <select id="input-status-select" class="glass-input" style="margin-bottom:15px; color:var(--accent-cyan); font-weight:bold;"></select>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="document.getElementById('modal-status').classList.add('hidden-view')" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:6px;">Cancel</button>
                <button id="btn-save-status" style="flex:1; padding:10px; background:var(--rag-amber); color:#000; border:none; border-radius:6px; font-weight:bold;">Update Status</button>
            </div>
        </div>
    </div>

    <input type="file" id="designer-quick-upload-input" class="hidden-view">

    <main id="view-customer" class="hidden-view dashboard-container">
        <button id="btn-return-designer" class="hidden-view filter-btn" style="margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px;">&larr; Return to Command Center</button>

        <div class="glass-card" style="display: flex; align-items: center; gap: 25px; margin-bottom: 30px; background: linear-gradient(135deg, rgba(21, 32, 43, 0.8), rgba(7, 11, 16, 0.9));">
            <div style="width: 70px; height: 70px; border-radius: 50%; background: #111; border: 2px solid var(--accent-cyan); display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                <span style="color:var(--accent-cyan); font-weight: 300;">T</span>
            </div>
            <div>
                <img id="vault-brand-logo" src="" style="height: 30px; object-fit: contain; margin-bottom: 8px;" class="hidden-view">
                <h2 style="font-size: 2.2rem; margin: 0; font-weight: 300;">Welcome, <strong id="vault-client-name" style="color: #fff;">...</strong></h2>
            </div>
        </div>

        <div class="vault-grid">
            
            <div style="display: flex; flex-direction: column; gap: 25px;">
                
                <div class="glass-card">
                    <div class="section-header">
                        <h3 style="margin: 0;">Project <span style="color: var(--accent-cyan);">Roadmap</span></h3>
                    </div>
                    <div id="vault-timeline-container" style="display: flex; flex-direction: column; gap: 15px;"></div>
                </div>

                <div class="glass-card">
                    <div class="collapsible-header" onclick="toggleCollapse('genesis-content', 'genesis-icon')">
                        <h3 style="margin: 0; font-size: 1.1rem; color: var(--accent-cyan);">Your Original Vision (Survey Data)</h3>
                        <svg id="genesis-icon" class="toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div id="genesis-content" class="collapsible-content">
                        <div id="genesis-data-rows"></div>
                        <h4 class="hidden-view" id="genesis-photo-header" style="margin-top: 20px; color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem;">Site Photography</h4>
                        <div id="genesis-photo-grid" class="gallery-grid"></div>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="collapsible-header" onclick="toggleCollapse('specs-content', 'specs-icon')">
                        <h3 style="margin: 0; font-size: 1.1rem; color: var(--accent-gold);">Architectural Blueprint (PDF)</h3>
                        <svg id="specs-icon" class="toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div id="specs-content" class="collapsible-content">
                        <div id="vault-specs-container"></div>
                    </div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 25px;">
                
                <div class="glass-card">
                    <div class="section-header"><h3 style="margin: 0; font-size: 1.1rem;">Visual Renderings</h3></div>
                    <div id="vault-gallery-container" class="gallery-grid"></div>
                </div>

                <div class="glass-card">
                    <div class="section-header"><h3 style="margin: 0; font-size: 1.1rem;">Secure Documents</h3></div>
                    <div id="vault-docs-container" style="max-height: 200px; overflow-y: auto;"></div>
                </div>
                
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        function toggleCollapse(contentId, iconId) {
            document.getElementById(contentId).classList.toggle('expanded');
            document.getElementById(iconId).parentElement.classList.toggle('expanded');
        }
    </script>
</body>
</html>
