<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Survey Engine V3 | CRM</title>
    <link rel="stylesheet" href="../style.css"> 
    <style>
        .hidden-view { display: none !important; }
        .dashboard-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .rag-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .rag-card { background: #1E1E1E; border-left: 5px solid #444; padding: 15px; border-radius: 8px; color: #fff; }
        .rag-card.green { border-color: #28a745; }
        .rag-card.amber { border-color: #ffc107; }
        .rag-card.red { border-color: #dc3545; }
    </style>
</head>
<body style="background: #0b1118; color: #fff; font-family: sans-serif; margin: 0;">

    <header id="global-nav" class="hidden-view" style="background: #15202b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h1 style="margin: 0; font-size: 1.2rem; color: #fff;">Survey Pro <span style="color: #0dcaf0;">V3</span></h1>
            <span id="nav-role-badge" style="background: #0dcaf0; color: #000; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;"></span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="brand-selector" class="hidden-view" style="padding: 5px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
                <option value="ALL">All Brands</option>
                <option value="CO Home Improvements">CO Home Improvements</option>
                <option value="Yorkshire Windows">Yorkshire Windows</option>
            </select>
            <button id="btn-logout" style="background: #dc3545; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Logout</button>
        </div>
    </header>

    <main id="view-login" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="background: #15202b; padding: 40px; border-radius: 12px; width: 100%; max-width: 350px; text-align: center; border: 1px solid #333;">
            <h2 style="margin-top: 0; color: #fff; letter-spacing: 1px;">VAULT ACCESS</h2>
            <div style="margin-top: 20px;">
                <input type="text" id="loginId" placeholder="User ID / Postcode" style="width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px;">
                <input type="password" id="loginPin" placeholder="PIN / Auth Code" style="width: 100%; padding: 12px; margin-bottom: 20px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px;">
                <button id="btn-login" style="width: 100%; padding: 12px; background: #0dcaf0; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem;">Authenticate</button>
            </div>
            <p id="login-error" class="hidden-view" style="color: #ff4444; margin-top: 15px; font-size: 0.9rem;"></p>
        </div>
    </main>

    <main id="view-admin" class="hidden-view dashboard-container">
        <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px; color: #0dcaf0;">Global Pipeline Overview</h2>
        <div id="admin-rag-container" class="rag-grid">
            <p style="color: #888;">Fetching live lead data...</p>
        </div>
    </main>

    <main id="view-designer" class="hidden-view dashboard-container">
        <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px; color: #28a745;">My Active Leads</h2>
        <div id="designer-pipeline-container" class="rag-grid">
            <p style="color: #888;">Fetching your pipeline...</p>
        </div>
    </main>

    <main id="view-customer" class="hidden-view dashboard-container">
        <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px; color: #ffc107;">Welcome back, <span id="vault-client-name"></span></h2>
        <div style="background: #1E1E1E; padding: 20px; border-radius: 8px; margin-top: 20px;">
            <h3>Your Project Documents</h3>
            <p style="color: #aaa;">Your finalized designs, specifications, and quotes will appear here once published by your designer.</p>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
