<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#15202b">
    <title>Powerhouse CRM | V3 Pro</title>
    
    <style>
        body { background: #0b1118; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }
        .hidden-view { display: none !important; }
        .dashboard-container { padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        button { font-family: inherit; transition: all 0.2s; cursor: pointer; }
        button:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
        
        .rag-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; margin-top: 20px; }
        .rag-card { background: #15202b; border: 1px solid #333; padding: 20px; border-radius: 12px; position: relative; display: flex; flex-direction: column; transition: border-color 0.2s; }
        .rag-card:hover { border-color: #0dcaf0; }
        .rag-indicator { position: absolute; top: 0; left: 0; width: 6px; height: 100%; border-radius: 12px 0 0 12px; }
        .bg-green { background: #28a745; } .bg-amber { background: #ffc107; } .bg-red { background: #dc3545; } .bg-blue { background: #0dcaf0; }
        
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 15px; border-radius: 8px; width: 100%; outline: none; transition: border 0.3s; }
        .glass-input:focus { border-color: #0dcaf0; }
        
        .chat-bubble { padding: 10px 14px; border-radius: 12px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .chat-bubble-user { background: #0dcaf0; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-bubble-them { background: #2a2a2a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .filter-btn { background: #222; border: 1px solid #444; color: #888; padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; white-space: nowrap; transition: all 0.2s; }
        .filter-btn.active { background: rgba(13, 202, 240, 0.15); color: #0dcaf0; border-color: #0dcaf0; }
        
        .spec-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 8px; font-size: 0.9rem; }
        
        /* Timeline Styles */
        .timeline-step { display: flex; align-items: flex-start; gap: 15px; position: relative; padding-bottom: 20px; }
        .timeline-step:last-child { padding-bottom: 0; }
        .timeline-line { position: absolute; left: 15px; top: 30px; bottom: 0; width: 2px; background: #333; z-index: 1; }
        .timeline-step:last-child .timeline-line { display: none; }
        .timeline-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; font-weight: bold; font-size: 0.8rem; border: 2px solid #333; background: #15202b; color: #666; }
        .step-completed .timeline-icon { background: #28a745; border-color: #28a745; color: #fff; }
        .step-active .timeline-icon { background: rgba(13,202,240,0.2); border-color: #0dcaf0; color: #0dcaf0; box-shadow: 0 0 10px rgba(13,202,240,0.4); }
        .step-completed .step-text { color: #fff; } .step-active .step-text { color: #0dcaf0; font-weight: bold; } .step-upcoming .step-text { color: #666; }

        /* Quick Action Buttons */
        .btn-quick { flex: 1; padding: 8px 5px; font-size: 0.75rem; font-weight: bold; border-radius: 6px; border: 1px solid #444; background: #222; color: #ccc; text-align: center; }
        .btn-quick:hover { background: #333; color: #fff; border-color: #666; }
        .btn-quick-primary { background: rgba(13,202,240,0.1); color: #0dcaf0; border-color: rgba(13,202,240,0.3); }

        /* Modal Background */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-box { background: #15202b; padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .gallery-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #444; }
    </style>
</head>
<body>

    <header id="global-nav" class="hidden-view" style="background: rgba(21, 32, 43, 0.95); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img id="header-brand-logo" src="" style="height: 35px; object-fit: contain;" class="hidden-view">
            <h1 id="header-default-title" style="margin: 0; font-size: 1.2rem; font-weight: 800;">Powerhouse <span style="color: #0dcaf0;">CRM</span></h1>
            <span id="nav-role-badge" style="background: rgba(13, 202, 240, 0.1); color: #0dcaf0; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; border: 1px solid rgba(13, 202, 240, 0.2);"></span>
        </div>
        <button id="btn-logout" style="background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 6px 16px; border-radius: 6px; font-weight: bold; font-size: 0.85rem;">Sign Out</button>
    </header>

    <main id="view-login" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="modal-box">
            <h2 style="text-align: center; margin: 0 0 25px 0;">Client <span style="color: #0dcaf0;">Vault.</span></h2>
            <input type="text" id="loginId" class="glass-input" placeholder="User ID / Postcode" style="margin-bottom: 15px;">
            <input type="password" id="loginPin" class="glass-input" placeholder="Secure PIN" style="margin-bottom: 25px;">
            <button id="btn-login" style="width: 100%; padding: 14px; background: #0dcaf0; color: #000; border: none; border-radius: 8px; font-weight: bold;">Access Vault</button>
            <p id="login-error" class="hidden-view" style="color: #ff4444; text-align: center; margin-top: 15px; font-size: 0.9rem;"></p>
        </div>
    </main>

    <main id="view-designer" class="hidden-view dashboard-container">
        <h2 style="margin-top: 0;">My Active Pipeline</h2>
        <div id="designer-pipeline-container" class="rag-grid"></div>
    </main>

    <div id="modal-notes" class="modal-overlay hidden-view">
        <div class="modal-box">
            <h3 style="margin-top:0;">Add Internal Note</h3>
            <textarea id="input-note-text" class="glass-input" rows="4" placeholder="Enter secure internal note..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="document.getElementById('modal-notes').classList.add('hidden-view')" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:6px;">Cancel</button>
                <button id="btn-save-note" style="flex:1; padding:10px; background:#0dcaf0; color:#000; border:none; border-radius:6px; font-weight:bold;">Save Note</button>
            </div>
        </div>
    </div>

    <div id="modal-contact" class="modal-overlay hidden-view">
        <div class="modal-box">
            <h3 style="margin-top:0;">Log Contact</h3>
            <select id="input-contact-type" class="glass-input" style="margin-bottom:15px;">
                <option value="Phone (Answered)">Phone - Answered</option>
                <option value="Phone (No Answer)">Phone - No Answer</option>
                <option value="Phone (VM Left)">Phone - Left Voicemail</option>
                <option value="WhatsApp">WhatsApp Message</option>
                <option value="Email">Email Sent</option>
            </select>
            <textarea id="input-contact-note" class="glass-input" rows="3" placeholder="Brief details..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="document.getElementById('modal-contact').classList.add('hidden-view')" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:6px;">Cancel</button>
                <button id="btn-save-contact" style="flex:1; padding:10px; background:#28a745; color:#fff; border:none; border-radius:6px; font-weight:bold;">Log Contact</button>
            </div>
        </div>
    </div>

    <div id="modal-status" class="modal-overlay hidden-view">
        <div class="modal-box">
            <h3 style="margin-top:0;">Update Pipeline Status</h3>
            <select id="input-status-select" class="glass-input" style="margin-bottom:15px; font-weight:bold; color:#0dcaf0;"></select>
            <textarea id="input-status-note" class="glass-input" rows="2" placeholder="Reason for change..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="document.getElementById('modal-status').classList.add('hidden-view')" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:6px;">Cancel</button>
                <button id="btn-save-status" style="flex:1; padding:10px; background:#ffc107; color:#000; border:none; border-radius:6px; font-weight:bold;">Update Status</button>
            </div>
        </div>
    </div>

    <main id="view-customer" class="hidden-view dashboard-container">
        <button id="btn-return-designer" class="hidden-view filter-btn" style="margin-bottom: 20px; display: flex; align-items: center; gap: 5px; color: #fff; border-color: #555;">&larr; Back to Pipeline</button>

        <div style="text-align: center; margin-bottom: 30px;">
            <img id="vault-brand-logo" src="" style="height: 60px; object-fit: contain; margin-bottom: 10px;" class="hidden-view">
            <h2 style="font-size: 2rem; margin: 0; font-weight: 900;">Your <span style="color: #0dcaf0;">Project Vault.</span></h2>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
            
            <div style="background: #15202b; padding: 25px; border-radius: 12px; border: 1px solid #333; grid-column: 1 / -1;">
                <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px;">Project Journey</h3>
                <div id="vault-timeline-container" style="margin-top: 20px;"></div>
            </div>

            <div style="background: #15202b; padding: 25px; border-radius: 12px; border: 1px solid #333; position: relative;">
                <div class="rag-indicator bg-blue"></div>
                <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px;">Architectural Specs</h3>
                <div id="vault-specs-container"></div>
            </div>

            <div style="background: #15202b; padding: 25px; border-radius: 12px; border: 1px solid #333; position: relative;">
                <div class="rag-indicator bg-amber"></div>
                <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px;">Visual Inspiration</h3>
                <div id="vault-gallery-container" class="gallery-grid"></div>
                
                <h4 style="margin-top: 20px; color: #888; font-size: 0.85rem; text-transform: uppercase;">Product Brochures</h4>
                <div id="vault-brochure-container" style="display: flex; gap: 10px; margin-top: 10px;"></div>
            </div>

            <div style="background: #15202b; padding: 25px; border-radius: 12px; border: 1px solid #333; position: relative; display: flex; flex-direction: column;">
                <div class="rag-indicator bg-green"></div>
                <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px;">Document Center</h3>
                <div id="vault-docs-container" style="flex-grow: 1; overflow-y: auto; max-height: 200px;"></div>

                <div id="designer-upload-panel" class="hidden-view" style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #444;">
                    <label style="font-size: 0.75rem; color: #0dcaf0; font-weight: bold;">Designer Upload (Cloudinary bypass)</label>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="file" id="doc-upload-input" class="glass-input" style="padding: 8px;">
                        <button id="btn-upload-doc" style="background: #0dcaf0; color: #000; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold;">Sync</button>
                    </div>
                    <p id="upload-status" style="color: #888; font-size: 0.75rem; margin-top: 5px;"></p>
                </div>
            </div>

            <div style="background: #15202b; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; grid-column: 1 / -1; height: 400px;">
                <div style="padding: 15px 25px; border-bottom: 1px solid #333; background: rgba(255,255,255,0.02);">
                    <h3 style="margin: 0; font-size: 1.1rem;">Direct Messaging</h3>
                </div>
                <div id="chat-window" style="flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;"></div>
                <div style="padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px;">
                    <input type="text" id="chat-input" class="glass-input" placeholder="Type a message...">
                    <button id="btn-send-chat" style="background: #28a745; color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold;">Send</button>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
