<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survey App</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DC9GD6Z"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0J8DC9GD6Z');
    </script>
</head>
<body>

    <div id="splashScreen">
        <div class="splash-content">
            <img src="logo.jpg" alt="Logo" class="splash-logo" onerror="this.style.display='none'">
            <h1 class="splash-title">PREDESIGN ENGINE</h1>
            <div class="loader-bar"><div class="loader-fill"></div></div>
        </div>
    </div>

    <header id="mainHeader" class="navbar navbar--top">
        <div class="navbar__container header-container">
            <div id="brandDisplay" class="brand-display">
                <img id="dynamicBrandLogo" src="" alt="Brand Logo" style="display: none;">
                <h1 id="dynamicBrandName" class="navbar__title">Survey App</h1>
            </div>
            <div id="headerControls" class="header-controls">
                <select id="brandSelect" class="form-group__input form-group__input--touch dropdown-brand">
                    <option value="">Select Brand...</option>
                    <option value="Clearview">Clearview</option>
                    <option value="CO Home Improvements">CO Home Improvements</option>
                    <option value="Orion Windows">Orion Windows</option>
                    <option value="Planet">Planet</option>
                    <option value="Trent Valley Windows">Trent Valley Windows</option>
                    <option value="West Yorkshire Windows">West Yorkshire Windows</option>
                    <option value="Yorkshire Windows">Yorkshire Windows</option>
                </select>
                <input list="designerList" id="designerSelect" class="form-group__input form-group__input--touch dropdown-designer" placeholder="Select Designer...">
                <datalist id="designerList"></datalist>
                <button id="openProfileManagerBtn" class="tool-btn profile-btn">⚙️ Profile</button>
            </div>
        </div>
    </header>

    <main class="main-container main-container--centered">
        <article class="card card--primary">
            <h2 class="card__title">Customer Details</h2>
            <div class="form-group"><label class="form-group__label">Customer Name:</label><input type="text" id="clientName" class="form-group__input form-group__input--touch"></div>
            <div class="form-group"><label class="form-group__label">Customer Num:</label><input type="tel" id="clientNum" class="form-group__input form-group__input--touch"></div>
            <div class="form-group"><label class="form-group__label">Customer Postcode:</label><input type="text" id="postCode" class="form-group__input form-group__input--touch"></div>
            <div class="form-group"><label class="form-group__label">Date of Appointment:</label><input type="date" id="apptDate" class="form-group__input form-group__input--touch"></div>
            <div class="form-group"><label class="form-group__label">2nd Appointment Date (Revisit):</label><input type="date" id="revisitDate" class="form-group__input form-group__input--touch"></div>
            <div class="form-group"><label class="form-group__label">2nd Appointment Location:</label><input type="text" id="revisitLocation" class="form-group__input form-group__input--touch" placeholder="e.g. your address, Our showroom..."></div>
        </article>

        <div style="display: flex; gap: 15px; margin-top: 34px;">
            <button id="generateCustomerPdfBtn" class="button" style="background: #2D2D2D; border: 2px solid var(--accent); box-shadow: none; width: 50%;">Customer Checklist PDF</button>
            <button id="generateInternalPdfBtn" class="button" style="width: 50%;">Full Survey PDF</button>
        </div>
        <button id="resetFormBtn" class="button btn-danger" style="margin-top: 20px; width: 100%;">Clear Form for Next Appointment</button>
    </main>

    <div id="pdfTemplateInternal" style="display: none;">...</div>
    <div id="pdfTemplateCustomer" style="display: none;">...</div>

    <div id="profileModal" class="modal-overlay" style="display: none;">...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="designers.js"></script>
    <script src="app.js"></script>
</body>
</html>
