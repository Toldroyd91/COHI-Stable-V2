<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COHI Survey Pro</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX'); 
    </script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#15202b">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Survey Pro">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Original Splash Screen & Base UI */
        #splashScreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0b1118; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        body { background-color: #121212; color: #F7F7F7; font-family: system-ui, sans-serif; overflow-x: hidden; }
        .luxury-input { background: #1A1A1A; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 12px; }
        .luxury-input:focus { border-color: #0D6EFD; }
        
        /* NEW: Precision Drafting Canvas Styles */
        #drafting-stage { position: relative; width: 100%; height: 60vh; overflow: hidden; touch-action: none; background: #000; border-radius: 12px; border: 1px solid #333; margin-top: 20px; }
        #survey-image-layer { transform-origin: 0 0; will-change: transform; position: absolute; }
        #vector-drawing-layer { position: absolute; inset: 0; pointer-events: none; }
        
        .precision-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px; pointer-events: none; z-index: 50; display: flex; align-items: center; justify-content: center; }
        .precision-crosshair::before { content: ''; position: absolute; width: 100%; height: 2px; background: rgba(13,202,240,0.9); box-shadow: 0 0 10px rgba(13,202,240,0.6); }
        .precision-crosshair::after { content: ''; position: absolute; height: 100%; width: 2px; background: rgba(13,202,240,0.9); box-shadow: 0 0 10px rgba(13,202,240,0.6); }
        .crosshair-dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; z-index: 51; box-shadow: 0 0 5px #000; }

        /* Measurement HUD */
        #hud-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(20px); border-top: 1px solid #444; padding: 25px 20px 40px 20px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        #hud-drawer.active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="splashScreen">
        <h1 class="text-3xl font-black text-white mb-4">COHI <span class="text-blue-500">SURVEY PRO</span></h1>
        <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <nav class="navbar sticky top-0 bg-[#1E1E1E] shadow-lg z-50 p-4 border-b border-gray-800">
        <div class="navbar__container flex justify-between items-center max-w-5xl mx-auto">
            <h2 class="text-xl font-bold tracking-tight">Survey<span class="text-blue-500">Engine</span> V2</h2>
            <div class="flex gap-2">
                <button id="btn-legacy-sync" class="bg-gray-800 text-xs font-bold py-2 px-4 rounded border border-gray-600 hover:border-blue-500 transition">Copy to CRM</button>
                <button id="btn-export-v3" class="bg-green-600 text-xs font-bold py-2 px-4 rounded shadow-lg hover:bg-green-500 transition">Sync to V3 Vault</button>
            </div>
        </div>
    </nav>

    <main class="p-4 md:p-8 max-w-5xl mx-auto" id="mainApp" style="display:none;">
        
        <section class="bg-[#1E1E1E] p-6 rounded-xl border border-gray-800 mb-8">
            <h3 class="text-xl font-bold mb-6 text-blue-400 border-b border-gray-800 pb-2">1. Client & Property Details</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Designer ID</label>
                    <select id="input-designer" class="luxury-input">
                        <option value="Tom">Tom</option>
                        <option value="Sobaan">Sobaan</option>
                        <option value="James">James</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Client Name</label>
                    <input type="text" id="input-client-name" class="luxury-input" placeholder="e.g. Mr. Dall">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Postcode</label>
                    <input type="text" id="input-postcode" class="luxury-input" placeholder="e.g. S70 1AA">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Proposed Build Type</label>
                    <input type="text" id="input-build-type" class="luxury-input" placeholder="e.g. Extension">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Roof Specification</label>
                    <select id="input-roof-type" class="luxury-input">
                        <option value="Ultra380">Ultra380</option>
                        <option value="LivinRoof">LivinRoof</option>
                        <option value="Edwardian roof">Edwardian roof</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Proposed Size / Area</label>
                    <input type="text" id="input-proposed-size" class="luxury-input" placeholder="e.g. 15 sqm">
                </div>
            </div>

            <div class="mt-4">
                <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Architectural Site Notes</label>
                <textarea id="input-notes" class="luxury-input" rows="4" placeholder="Enter rough site notes here..."></textarea>
            </div>
        </section>

        <section class="bg-[#1E1E1E] p-6 rounded-xl border border-gray-800 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-blue-400">2. Precision Site Drafting</h3>
                <div class="flex gap-2">
                    <button id="btn-upload-photo" class="bg-gray-800 px-4 py-2 rounded text-sm hover:bg-gray-700">📷 Upload Image</button>
                    <input type="file" id="hidden-file-input" accept="image/*" class="hidden">
                </div>
            </div>

            <div id="drafting-stage">
                <div id="survey-image-layer">
                    <img id="active-survey-photo" src="" style="display:none;" crossorigin="anonymous">
                    <canvas id="vector-drawing-layer"></canvas>
                </div>
                
                <div class="precision-crosshair" id="ui-crosshair">
                    <div class="crosshair-dot"></div>
                </div>

                <div class="absolute top-4 right-4 flex flex-col gap-2 z-40 bg-black/80 p-2 rounded-xl border border-white/10 backdrop-blur-md">
                    <button id="btn-zoom-in" class="w-10 h-10 bg-gray-800 text-white rounded-lg font-bold text-xl">+</button>
                    <div class="w-full h-px bg-gray-700"></div>
                    <button id="btn-zoom-out" class="w-10 h-10 bg-gray-800 text-white rounded-lg font-bold text-xl">-</button>
                </div>

                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex z-40 bg-black/90 p-2 rounded-xl border border-white/10 shadow-2xl">
                    <button id="btn-anchor-point" class="py-3 px-8 text-white rounded-lg bg-blue-600 font-bold shadow-lg">🎯 Anchor Start</button>
                </div>
            </div>
        </section>

    </main>

    <div id="hud-drawer">
        <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-6"></div>
        <h3 class="text-lg mb-4 font-semibold text-blue-400">Log Measurement</h3>
        <input type="text" id="input-measurement" class="luxury-input" placeholder="e.g., 2400mm" inputmode="numeric">
        <select id="input-line-type" class="luxury-input">
            <option value="wall">Wall Dimension</option>
            <option value="window">Window Width</option>
            <option value="height">Ceiling Height</option>
        </select>
        <button id="btn-save-measurement" class="bg-blue-600 text-white font-bold py-3 rounded-lg w-full mt-2">Commit Vector</button>
    </div>

    <div id="crm-bridge-modal" class="fixed inset-0 bg-black/90 z-[200] hidden flex-col items-center justify-center p-6">
        <div class="bg-[#1E1E1E] border border-gray-700 p-8 rounded-2xl w-full max-w-md text-center">
            <h3 class="text-2xl font-bold mb-2 text-green-500">Executing Sync</h3>
            <p class="text-gray-400 mb-6 text-sm" id="sync-status-text">Packaging survey data and pinging AI...</p>
            <div class="w-12 h-12 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="pdfGenerator.js"></script>
</body>
</html>
