<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COHI Survey Pro</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX'); 
    </script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Survey Pro">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --base-bg: #121212; --card-bg: #1E1E1E; --input-bg: #1A1A1A; --accent: #0D6EFD; }
        body { background: var(--base-bg); color: #F7F7F7; font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        
        .luxury-input { background: var(--input-bg); border: 1px solid #333; color: #fff; padding: 14px 16px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 15px; font-size: 16px; transition: 0.3s; }
        .luxury-input:focus { border-color: var(--accent); }
        .section-card { background: var(--card-bg); padding: 24px; border-radius: 12px; border: 1px solid #333; margin-bottom: 30px; }
        .section-header { font-size: 1.25rem; font-weight: 700; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 24px; }
        .form-label { display: block; font-size: 0.75rem; color: #A0A0A0; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .button { background: var(--accent); color: #fff; border: none; padding: 14px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .button:active { transform: scale(0.98); }

        /* Unified Designer Auth Gate */
        #authGate { position: fixed; inset: 0; background: #0b1118; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center; }

        /* Sniper UI Integration Layer */
        #sniper-modal { display: none; position: fixed; inset: 0; z-index: 100000; background: #121212; touch-action: none; }
        #sniper-viewport { position: absolute; inset: 0; overflow: hidden; }
        #sniper-canvas-container { transform-origin: 0 0; position: absolute; will-change: transform; }
        
        .sniper-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 50; display: flex; align-items: center; justify-content: center; }
        .sniper-crosshair::before { content: ''; position: absolute; width: 44px; height: 2px; background: #0dcaf0; box-shadow: 0 0 6px #000; }
        .sniper-crosshair::after { content: ''; position: absolute; height: 44px; width: 2px; background: #0dcaf0; box-shadow: 0 0 6px #000; }
        
        .sniper-ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; padding-bottom: env(safe-area-inset-bottom, 25px); }
        .nudge-btn { background: rgba(20,20,20,0.85); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        .nudge-btn:active { background: #0dcaf0; color: black; }
    </style>
</head>
<body>

    <div id="authGate">
        <div class="auth-box">
            <h1 class="text-3xl font-black text-white mb-2">DESIGNER <span class="text-[#0dcaf0]">LOGIN</span></h1>
            <p class="text-gray-400 text-sm mb-6">Unified Enterprise Authentication</p>
            <input type="email" id="authEmail" class="luxury-input" placeholder="Designer Email">
            <input type="password" id="authPassword" class="luxury-input" placeholder="Password">
            <button id="btnLogin" class="button w-full mb-4" style="background: #0dcaf0; color: black;">Authenticate</button>
            <p id="authError" class="text-red-500 text-sm hidden">Invalid Credentials.</p>
            </div>
    </div>

    <nav class="sticky top-0 bg-[#1E1E1E] shadow-xl z-50 p-4 border-b border-gray-800" id="mainNav" style="display: none;">
        <div class="flex justify-between items-center max-w-6xl mx-auto flex-wrap gap-4">
            <h2 class="text-xl font-bold text-white">Survey<span class="text-[#0dcaf0]">Engine</span> V2</h2>
            <div class="flex gap-2 flex-wrap">
                <button id="btn-go-v3" class="bg-indigo-600 text-white text-xs font-bold py-2 px-4 rounded-lg hover:bg-indigo-500">View V3 Dashboard</button>
                <button id="btn-legacy-sync" class="bg-[#1A1A1A] text-[#0dcaf0] text-xs font-bold py-2 px-4 rounded-lg border border-gray-700 hover:border-[#0dcaf0]">Copy to CRM</button>
                <button id="btn-export-v3" class="bg-[#10b981] text-white text-xs font-bold py-2 px-5 rounded-lg hover:bg-green-500">Sync to V3 Vault</button>
                <button id="generateCustomerPdfBtn" class="bg-blue-600 text-white text-xs font-bold py-2 px-5 rounded-lg hover:bg-blue-500">Export PDF</button>
                <button id="btnLogout" class="text-gray-400 text-xs hover:text-white px-2">Logout</button>
            </div>
        </div>
    </nav>

    <main class="p-4 md:p-8 max-w-6xl mx-auto" id="mainApp" style="display:none;">
        
        <section class="section-card">
            <h3 class="section-header">1. System Identity</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="form-label">Designer ID</label>
                    <input type="text" id="input-designer" class="luxury-input" value="Tom" readonly>
                </div>
                <div>
                    <label class="form-label">Brand Identity</label>
                    <select id="input-brand" class="luxury-input">
                        <option value="Yorkshire Windows">Yorkshire Windows</option>
                        <option value="CO Home Improvements">CO Home Improvements</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="section-card">
            <h3 class="section-header">2. Client & Property Specifications</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
                <div>
                    <label class="form-label">Lead Name</label>
                    <input type="text" id="input-client-name" class="luxury-input" placeholder="e.g. Mr. Dall">
                </div>
                <div>
                    <label class="form-label">Postcode</label>
                    <input type="text" id="input-postcode" class="luxury-input" placeholder="e.g. S70 1AA">
                </div>
                <div>
                    <label class="form-label">Customer Vault PIN</label>
                    <input type="text" id="input-customer-num" class="luxury-input" placeholder="survey123">
                </div>
                <div>
                    <label class="form-label">Roof System Spec</label>
                    <select id="input-roof-type" class="luxury-input">
                        <option value="Edwardian roof" selected>Edwardian roof</option>
                        <option value="Ultra380">Ultra380</option>
                        <option value="LivinRoof">LivinRoof</option>
                    </select>
                </div>
            </div>
        </section>
        <section class="section-card">
            <h3 class="section-header">3. Technical Sub-Structure & Data</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="form-label">Existing Foundations</label>
                    <select id="input-foundations" class="luxury-input">
                        <option value="New Required">New Required</option>
                        <option value="Existing (Retain)">Existing (Retain)</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Drainage Alterations</label>
                    <select id="input-drainage" class="luxury-input">
                        <option value="None">None Expected</option>
                        <option value="Move Manhole">Move Manhole</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Brick Match Required</label>
                    <input type="text" id="input-brick-match" class="luxury-input" placeholder="e.g. Ibstock Red">
                </div>
            </div>
            <div>
                <label class="form-label text-[#0dcaf0]">Designer Site Observations</label>
                <textarea id="customerNotes" class="luxury-input" rows="6" placeholder="Enter rough site observations..."></textarea>
            </div>
        </section>

        <section class="section-card">
            <h3 class="section-header">4. Blueprint Uploads (Sniper Ready)</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="border border-gray-700 p-4 rounded-xl text-center">
                    <label class="form-label text-white mb-3">Front Elevation</label>
                    <input type="file" id="photo-front" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-[#1A1A1A] file:text-[#0dcaf0] hover:file:bg-gray-800">
                    <div id="canvasFront-wrapper" class="hidden mt-4"><canvas id="canvasFront"></canvas></div>
                </div>
                
                <div class="border border-gray-700 p-4 rounded-xl text-center">
                    <label class="form-label text-white mb-3">Rear Elevation</label>
                    <input type="file" id="photo-rear" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-[#1A1A1A] file:text-[#0dcaf0] hover:file:bg-gray-800">
                    <div id="canvasRear-wrapper" class="hidden mt-4"><canvas id="canvasRear"></canvas></div>
                </div>
                
                <div class="border border-gray-700 p-4 rounded-xl text-center">
                    <label class="form-label text-white mb-3">Side Elevation</label>
                    <input type="file" id="photo-side" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-[#1A1A1A] file:text-[#0dcaf0] hover:file:bg-gray-800">
                    <div id="canvasSide-wrapper" class="hidden mt-4"><canvas id="canvasSide"></canvas></div>
                </div>
                
                <div class="border border-gray-700 p-4 rounded-xl text-center">
                    <label class="form-label text-white mb-3">Drainage / Misc</label>
                    <input type="file" id="photo-drainage" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-[#1A1A1A] file:text-[#0dcaf0] hover:file:bg-gray-800">
                    <div id="canvasDrainage-wrapper" class="hidden mt-4"><canvas id="canvasDrainage"></canvas></div>
                </div>

            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
    <script src="pdfGenerator.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed: ', err));
            });
        }
    </script>
</body>
</html>
