<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COHI Designer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1118; color: #ffffff; font-family: system-ui, sans-serif; }
        .glass-card { background: #1E1E1E; border: 1px solid #333; border-radius: 12px; transition: transform 0.2s; }
        .glass-card:hover { transform: translateY(-3px); border-color: #0dcaf0; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 9999px; font-weight: bold; background: rgba(13, 202, 240, 0.1); color: #0dcaf0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="authGate" class="fixed inset-0 bg-[#0b1118] z-50 flex flex-col items-center justify-center">
        <div class="glass-card p-10 w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-black text-white mb-2">DESIGNER <span class="text-[#0dcaf0]">HUB</span></h1>
            <p class="text-gray-400 text-sm mb-6">Enterprise Pipeline Authentication</p>
            <input type="email" id="authEmail" placeholder="Designer Email" class="w-full bg-[#1A1A1A] border border-gray-700 text-white p-4 rounded-lg mb-4 outline-none focus:border-[#0dcaf0]">
            <input type="password" id="authPassword" placeholder="Password" class="w-full bg-[#1A1A1A] border border-gray-700 text-white p-4 rounded-lg mb-6 outline-none focus:border-[#0dcaf0]">
            <button id="btnLogin" class="w-full bg-[#0dcaf0] text-black font-black p-4 rounded-lg uppercase tracking-wide hover:bg-cyan-400 transition-colors">Authenticate</button>
            <p id="authError" class="text-red-500 font-bold mt-4 hidden">Invalid Credentials.</p>
        </div>
    </div>

    <div id="dashboardApp" class="hidden flex-1 flex flex-col">
        <nav class="border-b border-gray-800 bg-[#121212] p-4 flex justify-between items-center sticky top-0 z-40">
            <div>
                <h2 class="text-xl font-bold">COHI<span class="text-[#0dcaf0]">Engine</span></h2>
                <p class="text-xs text-gray-500" id="designerWelcome">Welcome, Designer</p>
            </div>
            <div class="flex gap-4 items-center">
                <a href="survey.html" class="bg-[#10b981] hover:bg-emerald-400 text-white font-bold py-2 px-6 rounded-lg shadow-lg shadow-emerald-500/20 transition-all flex items-center gap-2">
                    <span>➕ New Survey</span>
                </a>
                <button id="btnLogout" class="text-gray-400 hover:text-white text-sm font-bold">Logout</button>
            </div>
        </nav>

        <main class="p-8 max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-end mb-6">
                <h3 class="text-2xl font-bold text-white">Active Pipeline</h3>
                <button id="btnRefresh" class="text-[#0dcaf0] text-sm hover:underline">↻ Refresh Data</button>
            </div>
            
            <div id="pipelineGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="text-gray-500 text-sm animate-pulse">Loading active projects from V3 Vault...</div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const appConfig = { apiKey: "AIzaSyD-QrqKxjes9f1TgyJOffiQzSMRncf84L0", authDomain: "cohi-survey-engine.firebaseapp.com", projectId: "cohi-survey-engine" };
        const app = !getApps().length ? initializeApp(appConfig) : getApp();
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authGate = document.getElementById('authGate');
        const dashboardApp = document.getElementById('dashboardApp');
        
        // Handle Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authGate.classList.add('hidden');
                dashboardApp.classList.remove('hidden');
                const name = user.email.split('@')[0];
                document.getElementById('designerWelcome').innerText = `Welcome, ${name.charAt(0).toUpperCase() + name.slice(1)}`;
                loadPipeline();
            } else {
                authGate.classList.remove('hidden');
                dashboardApp.classList.add('hidden');
            }
        });

        // Login Logic
        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPassword').value;
            const err = document.getElementById('authError');
            if(!email || !pass) { err.classList.remove('hidden'); return; }
            signInWithEmailAndPassword(auth, email, pass).catch(() => err.classList.remove('hidden'));
        });

        // Logout Logic
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
        
        // Refresh Logic
        document.getElementById('btnRefresh').addEventListener('click', () => loadPipeline());

        // Fetch Data from Firestore
        async function loadPipeline() {
            const grid = document.getElementById('pipelineGrid');
            grid.innerHTML = '<div class="text-gray-500 text-sm animate-pulse">Syncing...</div>';
            
            try {
                const q = query(collection(db, "surveys"), orderBy("updatedAt", "desc"), limit(20));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    grid.innerHTML = '<div class="text-gray-500 col-span-3">No active projects found. Click "New Survey" to start.</div>';
                    return;
                }

                grid.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const inputs = data.data?.inputs || {};
                    const clientName = data.clientName || 'Unknown Client';
                    const postCode = inputs.postCode || 'No Postcode';
                    const status = inputs._pipelineStatus || '1. Consultation & Survey';
                    const roof = inputs.roofType || 'Not specified';
                    // Formatting the date
                    const dateStr = data.updatedAt ? new Date(data.updatedAt.toDate()).toLocaleDateString('en-GB') : 'Unknown Date';

                    // Build Card
                    const card = document.createElement('div');
                    card.className = 'glass-card p-6 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <h4 class="text-xl font-black text-white">${clientName}</h4>
                                <span class="status-badge">${status.split('.')[0]}</span>
                            </div>
                            <div class="text-sm text-gray-400 mb-1">📍 ${postCode}</div>
                            <div class="text-sm text-gray-400 mb-4">🏠 ${roof}</div>
                        </div>
                        <div class="pt-4 border-t border-gray-800 flex justify-between items-center mt-4">
                            <span class="text-xs text-gray-500">Updated: ${dateStr}</span>
                            <button onclick="alert('UDesign Bridge coming soon!')" class="text-xs text-[#0dcaf0] hover:text-white font-bold transition-colors">Manage Files ↗</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching pipeline:", error);
                grid.innerHTML = '<div class="text-red-500 col-span-3">Error connecting to Vault database.</div>';
            }
        }
    </script>
</body>
</html>
